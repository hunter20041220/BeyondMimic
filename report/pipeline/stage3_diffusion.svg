<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="570" viewBox="0 0 1200 570">
<style>text{font-family:Arial,Helvetica,sans-serif}.title{font-size:30px;font-weight:700}.label{font-size:20px;font-weight:700}.desc{font-size:15px}</style>
<text class="title" x="600.0" y="42" text-anchor="middle">Stage 3: State-latent diffusion</text>
<rect x="170" y="80" width="860" height="82" rx="10" fill="#e8f1ff" stroke="#333" stroke-width="1.2"/>
<text class="label" x="194" y="111">Input</text>
<text class="desc" x="194" y="138">State-latent token windows from teacher rollout and VAE.</text>
<line x1="600.0" y1="162" x2="600.0" y2="184" stroke="#444" stroke-width="2"/>
<polygon points="593.0,183 607.0,183 600.0,194" fill="#444"/>
<rect x="170" y="190" width="860" height="82" rx="10" fill="#eef8ec" stroke="#333" stroke-width="1.2"/>
<text class="label" x="194" y="221">Noising</text>
<text class="desc" x="194" y="248">x_t = sqrt(a_bar)x_0 + sqrt(1-a_bar)eps.</text>
<line x1="600.0" y1="272" x2="600.0" y2="294" stroke="#444" stroke-width="2"/>
<polygon points="593.0,293 607.0,293 600.0,304" fill="#444"/>
<rect x="170" y="300" width="860" height="82" rx="10" fill="#fff2dc" stroke="#333" stroke-width="1.2"/>
<text class="label" x="194" y="331">Denoising</text>
<text class="desc" x="194" y="358">MLP denoiser predicts clean token from noisy token + timestep.</text>
<line x1="600.0" y1="382" x2="600.0" y2="404" stroke="#444" stroke-width="2"/>
<polygon points="593.0,403 607.0,403 600.0,414" fill="#444"/>
<rect x="170" y="410" width="860" height="82" rx="10" fill="#f5ebff" stroke="#333" stroke-width="1.2"/>
<text class="label" x="194" y="441">Current result</text>
<text class="desc" x="194" y="468">Noisy MSE 0.0728 -&gt; pred MSE 0.04322, about 40.6% improvement.</text>
</svg>
